<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #111; color: #fff; }
    header { padding: 20px; text-align: center; background: #1a1a1a; }
    nav a { margin: 0 15px; color: #fff; text-decoration: none; }
    section { padding: 60px 20px; text-align: center; }
    .projects { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #222; padding: 20px; border-radius: 15px; }
    footer { text-align: center; padding: 20px; background: #1a1a1a; }
    button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>나의 포트폴리오</h1>
  <nav>
    <a href="#about">소개</a>
    <a href="#projects">프로젝트</a>
    <a href="#contact">연락</a>
  </nav>
</header>

<section id="about">
  <h2>소개</h2>
  <p>안녕하세요! 저는 웹 개발을 배우고 있는 학생입니다.</p>
</section>

<section id="projects">
  <h2>프로젝트</h2>
  <div class="projects">
    <div class="card">
      <h3>프로젝트 1</h3>
      <p>간단한 웹사이트 제작</p>
    </div>
    <div class="card">
      <h3>프로젝트 2</h3>
      <p>앱 UI 디자인</p>
    </div>
    <div class="card">
      <h3>프로젝트 3</h3>
      <p>데이터 분석</p>
    </div>
  </div>
</section>

<section id="contact">
  <h2>연락하기</h2>
  <p>Email: example@email.com</p>
  <button onclick="alert('메일 보내기 기능은 아직 준비 중입니다.')">문의하기</button>
</section>

<footer>
  <p>© 2026 My Portfolio</p>
</footer>

</body>
</html>
